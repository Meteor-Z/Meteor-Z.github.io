site_name: Meteor-Z 个人博客
site_description: 个人博客
site_author: 刘泽辰
copyright: Metoer-Z
repo_url: https://github.com/Meteor-Z/Meteor-Z.github.io
site_url: http://liuzechen.top
nav:
  - 文章:
    - 总结: summarize.md
    - software_list.md
    - network_problem.md
    - lecture.md
    - assembly_language.md
    - classicpictures.md
    - 计算机网络: network.md 
  - 其他:
    - interview.md 
    - client_bible.md
    - web_build.md
  - 工具:
    - git: git.md
  - GitHub: https://github.com/Meteor-Z
  - 知乎: https://www.zhihu.com/people/newlzc 
plugins:
  - search
  - macros
  - print-site
theme: 
  name: material
  language: zh
  palette:
    primary: default
  font:
    code: Noto Sans Simplified Chinese
  features:
    - search.suggest
    - search.highlight
    # - navigation.tabs
markdown_extensions:
  - sane_lists
  - extra
  - tables
  - toc
  - fenced_code
  - smarty
  - pymdownx.arithmatex
  - mdx_truly_sane_lists # 支持嵌套列表的