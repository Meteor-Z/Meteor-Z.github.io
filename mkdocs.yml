site_name: Meteor-Z 个人博客
site_description: 个人博客
site_author: 刘泽辰
copyright: Metoer-Z
repo_url: https://github.com/Meteor-Z
nav:
  - 文章:
    - recommend.md
  - 关于:
    - index.md
  - GitHub: https://github.com/Meteor-Z
  - 知乎: https://www.zhihu.com/people/newlzc 
plugins:
  - search
  - macros
  - print-site
  - blogging:
      locale: zh_CN
theme: 
  name: mkdocs
  palette:
    primary: blue grey
  font:
    code: Noto Sans Simplified Chinese
  features:
    - search.suggest
    - search.highlight
  highlightjs: true
  hljs_languages: # rg '^```\w+' | sed 's/.*:```\(\w*\)/    - \1/g' | sort | uniq
    - bash
    - c
    - cmake
    - cpp
    - diff
    - java
    - json
    - llvm
    - nasm
    - python
    - rust
    - txt
extra_javascript:
  - extra.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS-MML_HTMLorMML
extra_css: 
  - extra.css
markdown_extensions:
  - extra
  - tables
  - toc
  - fenced_code
  - sane_lists
  - smarty
  - pymdownx.arithmatex